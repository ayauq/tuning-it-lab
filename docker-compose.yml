version: '3.8'

networks:
  monitoring:
    driver: bridge

volumes:
  db_data:
  n8n_data:

services:
  # Модуль 3: База данных
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lab_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d lab_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - monitoring

  # Модуль 4: Бэкенд
  backend:
    build: ./backend
    container_name: tuning_backend
    restart: always
    environment:
      DB_HOST: db
      DB_NAME: lab_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    depends_on:
      db:
        condition: service_healthy
    networks:
      - monitoring

  # Модуль 2: Прокси и Фронтенд
  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro  # Изменили путь тут
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - backend
    networks:
      - monitoring

  # Мониторинг: Сборщик метрик системы
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    expose:
      - 9100
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - monitoring

  # Мониторинг: База данных метрик
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    network_mode: "host"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M

  # Мониторинг: Визуализация
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    network_mode: "host"
    deploy:
      resources:
        limits:
          memory: 256M

  # Модуль 8: Интеллектуальный слой (n8n)
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - NODE_ENV=production
      - N8N_EDITOR_BASE_URL=https://rocket-refine-point-limitation.trycloudflare.com
      - WEBHOOK_URL=https://rocket-refine-point-limitation.trycloudflare.com
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - monitoring
